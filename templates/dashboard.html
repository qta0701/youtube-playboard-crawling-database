<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크롤링 대시보드 - YouTube Crawler Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 1.1em;
            color: #666;
            font-weight: 600;
        }

        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .chart-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-table th {
            background: #f5f5f5;
            color: #667eea;
            font-weight: 600;
        }

        .history-table tr:hover {
            background: #f9f9f9;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-success {
            background: #10b981;
            color: white;
        }

        .badge-error {
            background: #ef4444;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background 0.3s;
            margin-top: 20px;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 크롤링 대시보드</h1>
            <p class="subtitle">YouTube Crawler Pro - 실시간 통계 및 분석</p>
        </header>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="location.href='/'">🏠 메인으로</button>
            <button class="nav-btn refresh-btn" onclick="loadDashboard()">🔄 새로고침</button>
        </div>

        <!-- 통계 카드 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">🎬</div>
                <div class="stat-value" id="totalShorts">-</div>
                <div class="stat-label">쇼츠 수집</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📹</div>
                <div class="stat-value" id="totalVideos">-</div>
                <div class="stat-label">일반 영상 수집</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📺</div>
                <div class="stat-value" id="totalChannels">-</div>
                <div class="stat-label">채널 수집</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-value" id="totalCrawls">-</div>
                <div class="stat-label">총 크롤링 횟수</div>
            </div>
        </div>

        <!-- 탭 UI -->
        <div class="chart-card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('shorts')">쇼츠 통계</button>
                <button class="tab" onclick="switchTab('videos')">일반 영상 통계</button>
                <button class="tab" onclick="switchTab('channels')">채널 통계</button>
                <button class="tab" onclick="switchTab('history')">크롤링 히스토리</button>
            </div>

            <!-- 쇼츠 탭 -->
            <div id="shorts-tab" class="tab-content active">
                <h3>📊 카테고리별 쇼츠 분포</h3>
                <div class="chart-container">
                    <canvas id="shortsChart"></canvas>
                </div>
            </div>

            <!-- 일반 영상 탭 -->
            <div id="videos-tab" class="tab-content">
                <h3>📊 카테고리별 일반 영상 분포</h3>
                <div class="chart-container">
                    <canvas id="videosChart"></canvas>
                </div>
            </div>

            <!-- 채널 탭 -->
            <div id="channels-tab" class="tab-content">
                <h3>📊 카테고리별 채널 분포</h3>
                <div class="chart-container">
                    <canvas id="channelsChart"></canvas>
                </div>
            </div>

            <!-- 히스토리 탭 -->
            <div id="history-tab" class="tab-content">
                <h3>📅 최근 7일 수집량 추이</h3>
                <div class="chart-container">
                    <canvas id="historyChart"></canvas>
                </div>
                <h3 style="margin-top: 40px;">최근 크롤링 이력</h3>
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>타겟 타입</th>
                            <th>카테고리</th>
                            <th>국가</th>
                            <th>수집량</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr><td colspan="6" class="loading">데이터 로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let chartsData = {
            shortsChart: null,
            videosChart: null,
            channelsChart: null,
            historyChart: null
        };

        // 탭 전환 함수
        function switchTab(tabName) {
            // 모든 탭 비활성화
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // 선택한 탭 활성화
            event.target.classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        // 숫자 포맷팅 (천 단위 구분)
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // 대시보드 데이터 로딩
        async function loadDashboard() {
            try {
                // 통계 데이터 로딩
                const statsResponse = await fetch('/api/stats');
                const statsData = await statsResponse.json();

                if (statsData.status === 'success') {
                    updateStats(statsData.data);
                    updateCharts(statsData.data);
                }

                // 히스토리 데이터 로딩
                const historyResponse = await fetch('/api/history');
                const historyData = await historyResponse.json();

                if (historyData.status === 'success') {
                    updateHistoryChart(historyData.chart_data);
                    updateHistoryTable(historyData.recent_history);
                }
            } catch (error) {
                console.error('Dashboard loading error:', error);
                alert('대시보드 데이터 로딩 실패: ' + error.message);
            }
        }

        // 통계 카드 업데이트
        function updateStats(data) {
            document.getElementById('totalShorts').textContent = formatNumber(data.total_shorts || 0);
            document.getElementById('totalVideos').textContent = formatNumber(data.total_videos || 0);
            document.getElementById('totalChannels').textContent = formatNumber(data.total_channels || 0);
            document.getElementById('totalCrawls').textContent = formatNumber(data.total_crawls || 0);
        }

        // 차트 업데이트
        function updateCharts(data) {
            // 쇼츠 차트
            const shortsLabels = data.shorts_by_category.map(item => item.category);
            const shortsValues = data.shorts_by_category.map(item => item.count);
            createBarChart('shortsChart', '카테고리별 쇼츠 수', shortsLabels, shortsValues, '#667eea');

            // 일반 영상 차트
            const videosLabels = data.videos_by_category.map(item => item.category);
            const videosValues = data.videos_by_category.map(item => item.count);
            createBarChart('videosChart', '카테고리별 일반 영상 수', videosLabels, videosValues, '#10b981');

            // 채널 차트
            const channelsLabels = data.channels_by_category.map(item => item.category);
            const channelsValues = data.channels_by_category.map(item => item.count);
            createBarChart('channelsChart', '카테고리별 채널 수', channelsLabels, channelsValues, '#f59e0b');
        }

        // 막대 차트 생성
        function createBarChart(canvasId, label, labels, data, color) {
            const ctx = document.getElementById(canvasId).getContext('2d');

            // 기존 차트 삭제
            if (chartsData[canvasId]) {
                chartsData[canvasId].destroy();
            }

            chartsData[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: color,
                        borderColor: color,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        // 히스토리 차트 업데이트
        function updateHistoryChart(chartData) {
            const ctx = document.getElementById('historyChart').getContext('2d');

            // 기존 차트 삭제
            if (chartsData.historyChart) {
                chartsData.historyChart.destroy();
            }

            chartsData.historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: '일별 수집량',
                        data: chartData.data,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // 히스토리 테이블 업데이트
        function updateHistoryTable(history) {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';

            if (history.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">크롤링 이력이 없습니다</td></tr>';
                return;
            }

            history.forEach(record => {
                const row = document.createElement('tr');
                const statusBadge = record.success
                    ? '<span class="badge badge-success">성공</span>'
                    : '<span class="badge badge-error">실패</span>';

                row.innerHTML = `
                    <td>${new Date(record.crawled_at).toLocaleString('ko-KR')}</td>
                    <td>${record.target_type}</td>
                    <td>${record.category}</td>
                    <td>${record.country}</td>
                    <td>${formatNumber(record.item_count)}</td>
                    <td>${statusBadge}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 페이지 로드 시 대시보드 데이터 로딩
        window.onload = function() {
            loadDashboard();
        };
    </script>
</body>
</html>
